version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agroenlace_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agroenlace
      POSTGRES_PASSWORD: agroenlace123
      POSTGRES_DB: agroenlace_db
    ports:
      - '5432:5432'
    volumes:
      - agroenlace_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agroenlace -d agroenlace_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agroenlace_data:
